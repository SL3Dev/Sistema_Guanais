<!-- TELA DE LOGIN -->
<div id="loginScreen" class="login-container">
    <div class="petal petal-1"></div>
    <div class="petal petal-2"></div>
    <div class="petal petal-3"></div>
    <div class="petal petal-4"></div>
    <div class="login-card text-center">
        <h2 style="font-family: var(--font-display); font-size: 2.2rem; color: var(--cinza-txt);">Espaço Guanais</h2>
        <p class="text-muted mb-4" style="letter-spacing: 1px; font-size: 0.8rem; text-transform: uppercase;">Sistema de Gestão Clínica</p>
        <form id="loginForm">
            <div class="mb-3 text-start">
                <label class="form-label" for="loginUser">Usuário</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0">
                        <i class="bi bi-person text-muted"></i>
                    </span>
                    <input type="text" id="loginUser" class="form-control border-start-0 ps-0" placeholder="Digite seu usuário" autocomplete="off" required>
                </div>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label" for="loginPass">Senha</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0">
                        <i class="bi bi-lock text-muted"></i>
                    </span>
                    <input type="password" id="loginPass" class="form-control border-start-0 ps-0" placeholder="Digite sua senha" required>
                </div>
            </div>
            <button type="submit" class="btn btn-verde w-100 py-3 fw-semibold">
                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar no Sistema
            </button>
        </form>
        <div class="text-center mt-4">
            <small class="text-muted">Credenciais padrão: <strong>admin / 0301</strong></small>
        </div>
    </div>
</div>
